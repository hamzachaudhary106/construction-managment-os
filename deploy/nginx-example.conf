# Nginx example for one domain: app + Django admin.
# Without this, domain.com/admin is served by the React app and redirects to /login.
# Copy and adapt to your site (e.g. /etc/nginx/sites-available/construx360).

server {
    listen 80;
    server_name yourdomain.com;

    # React app (SPA) – root and all non-api, non-admin routes
    root /var/www/construx360/frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Django admin – MUST be proxied to backend so admin login works
    location /admin {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # API
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django static and media (for admin and uploads)
    location /static {
        alias /var/www/construx360/backend/staticfiles;
    }
    location /media {
        alias /var/www/construx360/backend/media;
    }
}

# HTTPS (after Certbot or manual SSL):
# server { listen 443 ssl; server_name yourdomain.com;
#   ssl_certificate ...; ssl_certificate_key ...;
#   ... same location blocks as above ...
# }
